<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0E0E0E" />
  <title>Conteo de Stock · Chamberí Brothers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    /* ---- Específico del formulario de conteo (sobre los tokens Paletos) ---- */
    .dateinput {
      min-height: 46px; padding: 0 12px; font-family: var(--font-mono); font-weight: 700;
      font-size: 15px; background: var(--pc-paper-pure); border: 2px solid var(--pc-ink);
      border-radius: 0; color: var(--pc-ink);
    }
    .loc { border-bottom: 1px solid var(--pc-grey-200); }
    .loc:last-child { border-bottom: 0; }
    .loc__head {
      display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
      padding: 14px 16px; background: transparent; border: 0; cursor: pointer;
      font: inherit; color: inherit;
    }
    .loc__name { flex: 1; min-width: 0; font-weight: 700; font-size: 18px; line-height: 1.25; }
    .loc__last {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      margin-top: 4px; font-family: var(--font-mono); font-size: 12px; color: var(--pc-grey-500); font-weight: 400;
    }
    .loc__count {
      flex-shrink: 0; font-family: var(--font-mono); font-weight: 700; font-size: 12px;
      padding: 4px 9px; border: 1.5px solid var(--pc-ink); border-radius: 999px; background: var(--pc-grey-100);
    }
    .loc__hint { margin: 10px 0 0; font-size: 14px; color: var(--pc-grey-500); font-style: italic; }
    .loc__chev { font-size: 26px; font-weight: 700; color: var(--pc-ink); transition: transform 150ms var(--ease-out); }
    .loc.is-open .loc__chev { transform: rotate(90deg); }
    .locbadge {
      flex-shrink: 0; font-family: var(--font-mono); font-weight: 700; font-size: 12px;
      padding: 5px 10px; border: 2px solid var(--success); color: var(--success); background: #eafbe9;
    }
    .loc__body { display: none; padding: 0 16px 16px; }
    .loc.is-open .loc__body { display: block; }
    .loc.is-open { background: var(--pc-paper); }

    .item { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; padding: 9px 0; border-bottom: 1px dashed var(--pc-grey-300); }
    .item__est {
      flex-shrink: 0; width: 48px; min-height: 52px; cursor: pointer;
      border: 2px solid var(--pc-ink); background: var(--pc-paper-pure); border-radius: 0;
      font-family: var(--font-mono); font-weight: 700; font-size: 19px;
    }
    .item__est.is-on { background: var(--pc-yellow); }
    .item__prev {
      flex-shrink: 0; min-width: 60px; min-height: 52px; padding: 0 10px; cursor: pointer;
      border: 2px solid var(--pc-ink); background: var(--pc-paper-pure); border-radius: 0;
      font-family: var(--font-mono); font-weight: 700; font-size: 16px; white-space: nowrap;
    }
    .item__prev:active { background: var(--pc-yellow); }
    .estrow { width: 100%; display: none; gap: 6px; flex-wrap: wrap; padding: 6px 0 2px; }
    .estrow.is-open { display: flex; }
    .estchip {
      min-height: 44px; padding: 0 15px; cursor: pointer; font-weight: 700; font-size: 15px;
      border: 1.5px solid var(--pc-ink); border-radius: 999px; background: var(--pc-paper-pure);
    }
    .estchip:active { background: var(--pc-yellow); }
    .qty__del { color: var(--pc-red); font-size: 17px; }
    .nochange {
      width: 100%; min-height: 50px; margin: 10px 0 4px; padding: 0 14px; cursor: pointer;
      border: 2px dashed var(--pc-grey-500); border-radius: 0; background: var(--pc-grey-100);
      font: inherit; font-weight: 700; font-size: 14px; text-align: left;
    }
    .nochange.is-confirm { background: var(--pc-yellow); border: 2px solid var(--pc-ink); }
    .nochange:disabled { opacity: .6; cursor: default; }
    .item__name { flex: 1; min-width: 0; font-size: 16px; font-weight: 600; line-height: 1.2; }
    .item--extra .item__name::after {
      content: "fuera de plan"; display: inline-block; margin-left: 8px; padding: 1px 7px;
      font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      background: var(--pc-yellow); border: 1.5px solid var(--pc-ink); border-radius: 999px;
    }
    .qty { display: flex; align-items: stretch; flex-shrink: 0; border: 2px solid var(--pc-ink); background: var(--pc-paper-pure); }
    .qty__btn {
      width: 52px; min-height: 52px; border: 0; cursor: pointer; font-size: 24px; font-weight: 700;
      background: var(--pc-grey-100); color: var(--pc-ink); font-family: var(--font-body);
    }
    .qty__btn:active { background: var(--pc-yellow); }
    .qty__num {
      width: 64px; border: 0; border-left: 2px solid var(--pc-ink); border-right: 2px solid var(--pc-ink);
      text-align: center; font-family: var(--font-mono); font-weight: 700; font-size: 20px;
      background: var(--pc-paper-pure); color: var(--pc-ink);
    }
    .qty__num:focus { outline: 3px solid var(--pc-yellow); outline-offset: -3px; }
    .qty__num::placeholder { color: var(--pc-grey-300); }
    .item.has-qty .qty__num { background: var(--pc-yellow); }
    .qty__clear { width: 40px; min-height: 52px; border: 0; border-left: 2px solid var(--pc-ink); cursor: pointer; background: var(--pc-paper-pure); color: var(--pc-grey-500); font-size: 16px; }

    .addwrap { margin-top: 12px; }
    .addsearch {
      width: 100%; min-height: 46px; padding: 0 12px; font: inherit; font-size: 15px;
      border: 2px dashed var(--pc-grey-500); border-radius: 0; background: transparent;
    }
    .addsearch:focus { outline: none; border: 2px solid var(--pc-ink); background: var(--pc-paper-pure); }
    .addresults { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .addresults button {
      text-align: left; padding: 9px 12px; font: inherit; font-size: 14px; cursor: pointer;
      border: 1.5px solid var(--pc-ink); background: var(--pc-paper-pure); border-radius: 0;
    }
    .addresults button:active { background: var(--pc-yellow); }

    .loc__save {
      margin-top: 14px; width: 100%; min-height: 58px; cursor: pointer;
      font-family: var(--font-display); font-size: 18px; text-transform: uppercase;
      background: var(--pc-red); color: var(--pc-paper); border: 2px solid var(--pc-ink);
      border-radius: 0; box-shadow: var(--shadow-stamp);
    }
    .loc__save:active { transform: translate(3px, 3px); box-shadow: none; }
    .loc__save:disabled { background: var(--pc-grey-300); color: var(--pc-grey-500); box-shadow: none; cursor: default; }
    .loc__save.is-saving { background: var(--pc-grey-700); }
  </style>
</head>
<body>
  <div class="app">
    <div class="stickyhead">
      <header class="topbar">
        <div class="topbar__brand">
          <span class="eyebrow">Chamberí Brothers · Control de stock</span>
          <h1 class="topbar__title">Conteo</h1>
          <span class="topbar__date" id="dateLabel">—</span>
        </div>
        <div class="topbar__right">
          <a class="viewtoggle" href="../?live" title="Volver a las tareas de hoy">
            <span class="viewtoggle__icon">📋</span>
            <span class="viewtoggle__label">Tareas</span>
          </a>
          <div class="topbar__score">
            <div class="score"><span class="score__done" id="scoreDone">0</span><span class="score__sep">/</span><span class="score__total" id="scoreTotal">0</span></div>
            <span class="score__label">ubicaciones contadas</span>
          </div>
        </div>
      </header>
      <div class="filters">
        <div class="filterrow">
          <span class="filterrow__label">Fecha</span>
          <input type="date" id="fechaInput" class="dateinput" />
        </div>
        <div class="filterrow" id="turnoBar" role="group" aria-label="Turno del conteo">
          <span class="filterrow__label">Turno</span>
        </div>
      </div>
    </div>

    <main class="board" id="board"><div class="loading">Cargando ubicaciones…</div></main>

    <footer class="footer">
      <span id="sourceLabel" class="footer__src">conteos → Notion · CONTROL DE STOCK</span>
      <span style="display:inline-flex; gap:8px;">
        <a class="ghostbtn" href="../?live" style="text-decoration:none; color:inherit; display:inline-flex; align-items:center;">← Tareas</a>
        <button class="ghostbtn" id="reloadBtn">↻ Recargar</button>
      </span>
    </footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="assertive"></div>

  <script src="conteo.js?v=4"></script>
</body>
</html>
