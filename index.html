<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#D7261E" />
  <title>Tareas de Hoy · Chamberí Brothers</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="app">
    <div class="stickyhead">
    <header class="topbar">
      <div class="topbar__brand">
        <span class="eyebrow">Chamberí Brothers · Operativa diaria</span>
        <h1 class="topbar__title">Tareas de hoy</h1>
        <span class="topbar__date" id="dateLabel">—</span>
      </div>
      <div class="topbar__right">
        <a class="viewtoggle" href="conteo/" title="Ir al conteo de stock">
          <span class="viewtoggle__icon">📦</span>
          <span class="viewtoggle__label">Conteo</span>
        </a>
        <button class="viewtoggle" id="viewToggle" type="button" aria-pressed="false" title="Ver tareas completadas hoy">
          <span class="viewtoggle__icon" id="viewToggleIcon">✓</span>
          <span class="viewtoggle__label" id="viewToggleLabel">Completadas</span>
        </button>
        <div class="topbar__score">
          <div class="score">
            <span class="score__done" id="scoreDone">0</span>
            <span class="score__sep">/</span>
            <span class="score__total" id="scoreTotal">0</span>
          </div>
          <span class="score__label">hechas</span>
        </div>
      </div>
    </header>

    <!-- Selector de tipo de tarea (slide / segmented control) -->
    <div class="source-selector">
      <div class="source-tabs" role="tablist" aria-label="Seleccionar tipo de tareas">
        <button class="source-tab active" data-source="recurrent" role="tab" aria-selected="true">Recurrentes</button>
        <button class="source-tab" data-source="emergent" role="tab" aria-selected="false">Emergentes</button>
      </div>
    </div>

    <div class="filters">
      <div class="filterrow" id="turnoBar" role="group" aria-label="Filtrar por turno"></div>
      <div class="filterrow" id="personBar" role="group" aria-label="Filtrar por persona"></div>
    </div>
    </div>

    <main class="board" id="board" aria-live="polite"></main>

    <div class="emptystate" id="emptyState" hidden>
      <div class="emptystate__mark">✓</div>
      <h2>¡Todo hecho!</h2>
      <p>No quedan tareas pendientes en esta vista. Buen trabajo.</p>
    </div>

    <footer class="footer">
      <span id="sourceLabel" class="footer__src">datos: semilla</span>
      <button class="ghostbtn" id="reloadBtn">↻ Recargar</button>
    </footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="assertive"></div>

  <script src="assets/app.js"></script>
</body>
</html>
